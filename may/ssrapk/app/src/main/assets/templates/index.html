<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <p class="badge">Server-side rendered</p>
    <h1>{{Message}}</h1>
    <p class="lead">This HTML was generated on the server inside this APK, then shown in Android <code>WebView</code> (same pattern as <code>may/ssrdesktop</code> on Mac).</p>
    <dl class="meta">
      <div><dt>Rendered at</dt><dd>{{RenderedAt}}</dd></div>
      <div><dt>Runtime</dt><dd>{{Runtime}}</dd></div>
      <div><dt>Platform</dt><dd>{{Platform}}</dd></div>
    </dl>
    <form method="get" action="/" class="greet">
      <label for="name">Your name</label>
      <input id="name" name="name" type="text" value="{{Name}}" placeholder="World">
      <button type="submit">Greet</button>
    </form>
  </main>
</body>
</html>
