<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Google Chat to Drive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .status-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #555;
            font-size: 14px;
        }

        .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .status-icon.connected {
            background: #10b981;
            color: white;
        }

        .status-icon.disconnected {
            background: #ef4444;
            color: white;
        }

        .status-icon.pending {
            background: #f59e0b;
            color: white;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e5e7eb;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn.syncing {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .settings {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .setting-label {
            font-size: 14px;
            color: #555;
        }

        select, input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-width: 180px;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .log-container {
            margin-top: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #4ade80;
            display: none;
        }

        .log-container.visible {
            display: block;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .log-entry.warn {
            color: #f59e0b;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Google Chat Sync</h1>
        <p class="subtitle">Backup your workspace chats to Google Drive</p>

        <div class="status-card">
            <div class="status-item">
                <div class="status-label">
                    <span class="status-icon disconnected" id="chatStatus">✕</span>
                    <span>Google Chat</span>
                </div>
                <span id="chatText">Not connected</span>
            </div>
            <div class="status-item">
                <div class="status-label">
                    <span class="status-icon disconnected" id="driveStatus">✕</span>
                    <span>Google Drive</span>
                </div>
                <span id="driveText">Not connected</span>
            </div>
        </div>

        <button class="btn btn-secondary" id="connectBtn" onclick="connectServices()">
            <span>🔐</span> Connect Google Services
        </button>

        <button class="btn btn-primary" id="syncBtn" onclick="startSync()" disabled>
            <span>🔄</span> Sync Now
        </button>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="settings">
            <div class="setting-item">
                <span class="setting-label">Workspace</span>
                <select id="workspaceSelect">
                    <option value="">Select workspace...</option>
                    <option value="all">All Workspaces</option>
                    <option value="ws1">Workspace 1</option>
                    <option value="ws2">Workspace 2</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="setting-label">Auto-sync daily</span>
                <label class="toggle">
                    <input type="checkbox" id="autoSync">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="setting-item">
                <span class="setting-label">Include attachments</span>
                <label class="toggle">
                    <input type="checkbox" id="includeAttachments" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        // Configuration - Replace with your actual credentials
        const CONFIG = {
            CLIENT_ID: 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',
            API_KEY: 'YOUR_GOOGLE_API_KEY',
            SCOPES: [
                'https://www.googleapis.com/auth/chat.spaces.readonly',
                'https://www.googleapis.com/auth/chat.messages.readonly',
                'https://www.googleapis.com/auth/drive.file',
                'https://www.googleapis.com/auth/drive.appdata'
            ].join(' ')
        };

        let isConnected = false;
        let isSyncing = false;
        let accessToken = null;

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            container.classList.add('visible');

            // Also log to browser console
            if (type === 'error') {
                console.error('[SyncDriveChat]', message);
            } else if (type === 'warn') {
                console.warn('[SyncDriveChat]', message);
            } else {
                console.log('[SyncDriveChat]', message);
            }
        }

        function updateStatus(service, connected, text) {
            const icon = document.getElementById(service + 'Status');
            const label = document.getElementById(service + 'Text');
            
            icon.className = 'status-icon ' + (connected ? 'connected' : 'disconnected');
            icon.textContent = connected ? '✓' : '✕';
            label.textContent = text;
        }

        async function connectServices() {
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                // Initialize Google Identity Services
                if (typeof google === 'undefined') {
                    // Load Google API script dynamically
                    await loadGoogleAPI();
                }

                // Check if using placeholder credentials
                if (CONFIG.CLIENT_ID.includes('YOUR_GOOGLE') || CONFIG.API_KEY.includes('YOUR_GOOGLE')) {
                    console.error('[Config] Using placeholder credentials!');
                    log('Please update CLIENT_ID and API_KEY in the CONFIG section', 'error');
                    alert('Error: You need to set your Google Client ID and API Key first!\n\nSee instructions in the code.');
                    btn.disabled = false;
                    btn.innerHTML = '<span>🔐</span> Connect Google Services';
                    return;
                }

                // Request OAuth token
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CONFIG.CLIENT_ID,
                    scope: CONFIG.SCOPES,
                    prompt: 'consent', // Force consent screen to ensure refresh token
                    callback: (tokenResponse) => {
                        console.log('[OAuth Callback] Received token response:', tokenResponse);
                        if (tokenResponse.access_token) {
                            accessToken = tokenResponse.access_token;
                            isConnected = true;
                            console.log('[OAuth] Access token acquired, length:', accessToken.length);
                            
                            updateStatus('chat', true, 'Connected');
                            updateStatus('drive', true, 'Connected');
                            
                            document.getElementById('syncBtn').disabled = false;
                            btn.innerHTML = '<span>✓</span> Connected';
                            btn.style.background = '#10b981';
                            btn.style.color = 'white';
                            
                            log('Successfully connected to Google services');
                            loadWorkspaces();
                        } else {
                            console.warn('[OAuth] No access token in response:', tokenResponse);
                            log('Connection failed: No access token received', 'error');
                        }
                    },
                    error_callback: (error) => {
                        console.error('[OAuth Error]', error);
                        
                        let errorMsg = error.message || error.error || 'Unknown error';
                        
                        // Provide helpful error messages
                        if (errorMsg.includes('Popup window closed')) {
                            errorMsg = 'Login popup was closed. Please allow popups for this site and try again.';
                            console.warn('[OAuth] Popup was closed. Possible causes:');
                            console.warn('  1. User closed the popup manually');
                            console.warn('  2. Browser blocked the popup (check address bar for blocked popup icon)');
                            console.warn('  3. Popup blocker extension is active');
                        } else if (errorMsg.includes('access_denied')) {
                            errorMsg = 'Access was denied. Please grant the requested permissions.';
                        } else if (errorMsg.includes('invalid_client')) {
                            errorMsg = 'Invalid Client ID. Please check your Google Cloud Console configuration.';
                        }
                        
                        log('Connection failed: ' + errorMsg, 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<span>🔐</span> Connect Google Services';
                    }
                });

                console.log('[OAuth] Requesting access token...');
                console.log('[OAuth] If popup is blocked, look for a blocked popup icon in your address bar');
                
                // Use popup with fallback hint
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } catch (error) {
                console.error('[Connection Error]', error);
                log('Connection error: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>🔐</span> Connect Google Services';
            }
        }

        function loadGoogleAPI() {
            console.log('[Google API] Loading Google Identity Services script...');
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.async = true;
                script.defer = true;
                script.onload = () => {
                    console.log('[Google API] Script loaded successfully');
                    resolve();
                };
                script.onerror = (err) => {
                    console.error('[Google API] Failed to load script', err);
                    reject(new Error('Failed to load Google API'));
                };
                document.head.appendChild(script);
            });
        }

        async function loadWorkspaces() {
            console.log('[Workspaces] Fetching spaces from Google Chat...');
            try {
                const response = await fetch('https://chat.googleapis.com/v1/spaces', {
                    headers: {
                        'Authorization': 'Bearer ' + accessToken,
                        'Accept': 'application/json'
                    }
                });

                console.log('[Workspaces] Response status:', response.status, response.statusText);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('[Workspaces] Received data:', data);
                    
                    const select = document.getElementById('workspaceSelect');
                    select.innerHTML = '<option value="">Select workspace...</option><option value="all">All Workspaces</option>';
                    
                    if (data.spaces) {
                        data.spaces.forEach(space => {
                            const option = document.createElement('option');
                            option.value = space.name;
                            option.textContent = space.displayName || 'Unnamed Space';
                            select.appendChild(option);
                        });
                    }
                    log(`Loaded ${data.spaces ? data.spaces.length : 0} workspaces`);
                } else {
                    const errorText = await response.text();
                    console.error('[Workspaces] API error:', response.status, errorText);
                    log('Failed to load workspaces: ' + response.status + ' ' + response.statusText, 'error');
                }
            } catch (error) {
                console.error('[Workspaces] Fetch error:', error);
                log('Failed to load workspaces: ' + error.message, 'error');
            }
        }

        async function startSync() {
            if (isSyncing) {
                console.warn('[Sync] Already syncing, skipping...');
                return;
            }

            const workspace = document.getElementById('workspaceSelect').value;
            console.log('[Sync] Starting sync for workspace:', workspace);
            
            if (!workspace) {
                console.warn('[Sync] No workspace selected');
                alert('Please select a workspace first');
                return;
            }

            isSyncing = true;
            const btn = document.getElementById('syncBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');

            btn.disabled = true;
            btn.classList.add('syncing');
            btn.innerHTML = '<span>⏳</span> Syncing...';
            progressBar.classList.add('active');

            log('Starting sync process...');

            try {
                // Step 1: Create backup folder in Drive if not exists
                console.log('[Sync] Step 1: Creating backup folder...');
                log('Creating backup folder in Drive...');
                const folderId = await createOrGetBackupFolder();
                console.log('[Sync] Backup folder ID:', folderId);
                updateProgress(20);

                // Step 2: Fetch messages from selected workspace(s)
                console.log('[Sync] Step 2: Fetching messages...');
                log('Fetching chat messages...');
                const messages = await fetchMessages(workspace);
                console.log('[Sync] Fetched', messages.length, 'messages');
                updateProgress(50);

                // Step 3: Process and format data
                console.log('[Sync] Step 3: Processing data...');
                log(`Processing ${messages.length} messages...`);
                const backupData = formatBackupData(messages);
                console.log('[Sync] Backup data prepared, size:', JSON.stringify(backupData).length, 'bytes');
                updateProgress(70);

                // Step 4: Upload to Drive
                console.log('[Sync] Step 4: Uploading to Drive...');
                log('Uploading to Google Drive...');
                const uploadResult = await uploadToDrive(folderId, backupData);
                console.log('[Sync] Upload successful:', uploadResult);
                updateProgress(100);

                log('Sync completed successfully!', 'info');
                btn.innerHTML = '<span>✓</span> Sync Complete!';
                btn.style.background = '#10b981';

                setTimeout(() => {
                    btn.innerHTML = '<span>🔄</span> Sync Now';
                    btn.style.background = '';
                    btn.classList.remove('syncing');
                    progressBar.classList.remove('active');
                    progressFill.style.width = '0%';
                }, 3000);

            } catch (error) {
                console.error('[Sync] Sync failed:', error);
                log('Sync failed: ' + error.message, 'error');
                btn.innerHTML = '<span>❌</span> Sync Failed';
                btn.classList.remove('syncing');
            } finally {
                isSyncing = false;
                btn.disabled = false;
            }
        }

        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }

        async function createOrGetBackupFolder() {
            console.log('[Drive] Searching for existing backup folder...');
            
            try {
                // Search for existing backup folder
                const response = await fetch(
                    `https://www.googleapis.com/drive/v3/files?q=name='Chat Backups' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
                    {
                        headers: {
                            'Authorization': 'Bearer ' + accessToken
                        }
                    }
                );

                console.log('[Drive] Search response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[Drive] Search failed:', errorText);
                    throw new Error('Failed to search for folder: ' + response.statusText);
                }

                const data = await response.json();
                console.log('[Drive] Search result:', data);
                
                if (data.files && data.files.length > 0) {
                    console.log('[Drive] Found existing folder:', data.files[0].id);
                    return data.files[0].id;
                }

                // Create new folder
                console.log('[Drive] No folder found, creating new one...');
                const createResponse = await fetch('https://www.googleapis.com/drive/v3/files', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'Chat Backups',
                        mimeType: 'application/vnd.google-apps.folder'
                    })
                });

                if (!createResponse.ok) {
                    const errorText = await createResponse.text();
                    console.error('[Drive] Create folder failed:', errorText);
                    throw new Error('Failed to create folder: ' + createResponse.statusText);
                }

                const newFolder = await createResponse.json();
                console.log('[Drive] Created new folder:', newFolder.id);
                return newFolder.id;
            } catch (error) {
                console.error('[Drive] Folder operation failed:', error);
                throw error;
            }
        }

        async function fetchMessages(spaceId) {
            console.log('[Messages] Fetching messages for space:', spaceId);
            const messages = [];
            
            try {
                if (spaceId === 'all') {
                    // Fetch from all spaces
                    console.log('[Messages] Fetching from all spaces...');
                    const spacesResponse = await fetch('https://chat.googleapis.com/v1/spaces', {
                        headers: {
                            'Authorization': 'Bearer ' + accessToken
                        }
                    });
                    
                    if (!spacesResponse.ok) {
                        const errorText = await spacesResponse.text();
                        console.error('[Messages] Failed to fetch spaces list:', errorText);
                        throw new Error('Failed to fetch spaces: ' + spacesResponse.statusText);
                    }
                    
                    const spacesData = await spacesResponse.json();
                    console.log('[Messages] Found', spacesData.spaces ? spacesData.spaces.length : 0, 'spaces');
                    
                    if (spacesData.spaces) {
                        for (const space of spacesData.spaces) {
                            console.log('[Messages] Fetching messages from space:', space.name);
                            const spaceMessages = await fetchSpaceMessages(space.name);
                            messages.push(...spaceMessages);
                        }
                    }
                } else {
                    const spaceMessages = await fetchSpaceMessages(spaceId);
                    messages.push(...spaceMessages);
                }

                console.log('[Messages] Total messages fetched:', messages.length);
                return messages;
            } catch (error) {
                console.error('[Messages] Error fetching messages:', error);
                throw error;
            }
        }

        async function fetchSpaceMessages(spaceId) {
            console.log('[SpaceMessages] Fetching from space:', spaceId);
            
            try {
                const response = await fetch(`https://chat.googleapis.com/v1/${spaceId}/messages?pageSize=100`, {
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    }
                });

                console.log('[SpaceMessages] Response status:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    const messageCount = data.messages ? data.messages.length : 0;
                    console.log('[SpaceMessages] Fetched', messageCount, 'messages from', spaceId);
                    return data.messages || [];
                } else {
                    const errorText = await response.text();
                    console.error('[SpaceMessages] Failed to fetch:', response.status, errorText);
                    return [];
                }
            } catch (error) {
                console.error('[SpaceMessages] Error fetching space messages:', error);
                return [];
            }
        }

        function formatBackupData(messages) {
            console.log('[Format] Formatting', messages.length, 'messages for backup');
            
            const timestamp = new Date().toISOString().split('T')[0];
            const backupData = {
                exportDate: new Date().toISOString(),
                totalMessages: messages.length,
                messages: messages.map(msg => ({
                    id: msg.name,
                    text: msg.text,
                    sender: msg.sender?.displayName || 'Unknown',
                    timestamp: msg.createTime,
                    thread: msg.thread?.name || null,
                    space: msg.space?.displayName || 'Unknown'
                }))
            };
            
            console.log('[Format] Backup data formatted, messages count:', backupData.messages.length);
            return backupData;
        }

        async function uploadToDrive(folderId, data) {
            console.log('[Upload] Starting upload to folder:', folderId);
            
            try {
                const timestamp = new Date().toISOString().split('T')[0];
                const filename = `chat-backup-${timestamp}.json`;
                console.log('[Upload] Filename:', filename);
                
                const fileMetadata = {
                    name: filename,
                    parents: [folderId],
                    mimeType: 'application/json'
                };

                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(fileMetadata)], { type: 'application/json' }));
                formData.append('file', new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }));

                console.log('[Upload] Sending multipart request...');
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    },
                    body: formData
                });

                console.log('[Upload] Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[Upload] Upload failed:', errorText);
                    throw new Error('Upload failed: ' + response.statusText + ' - ' + errorText);
                }

                const result = await response.json();
                console.log('[Upload] Upload successful, file ID:', result.id);
                return result;
            } catch (error) {
                console.error('[Upload] Upload error:', error);
                throw error;
            }
        }

        // Auto-sync checkbox handler
        document.getElementById('autoSync').addEventListener('change', function(e) {
            console.log('[AutoSync] Checkbox changed:', e.target.checked);
            if (e.target.checked) {
                log('Auto-sync enabled - will sync daily at 00:00');
                scheduleDailySync();
            } else {
                log('Auto-sync disabled');
            }
        });

        function scheduleDailySync() {
            console.log('[AutoSync] Scheduling daily sync...');
            
            // Simple daily sync using setTimeout
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            
            const msUntilMidnight = tomorrow - now;
            console.log('[AutoSync] Next sync scheduled in', Math.round(msUntilMidnight / 1000 / 60), 'minutes');
            
            setTimeout(() => {
                console.log('[AutoSync] Auto-sync triggered at midnight');
                if (isConnected && document.getElementById('autoSync').checked) {
                    startSync();
                }
                scheduleDailySync(); // Reschedule for next day
            }, msUntilMidnight);
        }

        // Log initial load
        console.log('[SyncDriveChat] Application loaded');
        console.log('[SyncDriveChat] Current config:', { CLIENT_ID: CONFIG.CLIENT_ID.substring(0, 20) + '...', API_KEY: CONFIG.API_KEY.substring(0, 10) + '...' });
    </script>
</body>
</html>
