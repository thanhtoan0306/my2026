<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>— USDT</title>
gggggg  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #f7931a;
      --green: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
    }
    body {
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
    }
    main {
      width: 90vw;
      max-width: 90vw;
      height: 90vh;
      height: 90dvh;
      max-height: 90dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    .pair {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .pair { flex-shrink: 0; }
    .price {
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 600;
      margin: 0.35rem 0 0.75rem;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .price.loading { color: var(--muted); font-size: 1.25rem; }
    .chart-wrap {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      padding: 0.5rem 0.5rem 0.25rem;
    }
    .chart-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      padding: 0 0.25rem;
    }
    #chart {
      display: block;
      width: 100%;
      flex: 1 1 0;
      min-height: 72px;
      height: 100%;
    }
    dl {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem 1rem;
    }
    dt { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
    dd { font-size: 1rem; font-variant-numeric: tabular-nums; }
    .range-bar {
      grid-column: 1 / -1;
      margin-top: 0.5rem;
    }
    .range-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin: 0.5rem 0 0.25rem;
      position: relative;
      overflow: hidden;
    }
    .range-fill {
      position: absolute;
      top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--red), var(--accent), var(--green));
      opacity: 0.6;
    }
    .range-marker {
      position: absolute;
      top: -2px;
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 6px var(--accent);
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .test-ding {
      flex-shrink: 0;
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.6rem 1rem;
      font: inherit;
      font-size: 0.8rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
    }
    .test-ding:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .ding-toggles {
      flex-shrink: 0;
      margin-top: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .toggle-row input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-switch {
      flex-shrink: 0;
      width: 36px;
      height: 20px;
      background: var(--border);
      border-radius: 10px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-row input:checked + .toggle-switch {
      background: rgba(247, 147, 26, 0.35);
    }
    .toggle-row input:checked + .toggle-switch::after {
      transform: translateX(16px);
      background: var(--accent);
    }
    .toggle-row input:checked ~ .toggle-label {
      color: var(--text);
    }
    footer {
      flex-shrink: 0;
      margin-top: auto;
      padding-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }
    .error {
      flex-shrink: 0;
      color: var(--red);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }
    .price.ding-up { animation: ding 0.35s ease; color: var(--green); }
    .price.ding-down { animation: ding 0.35s ease; color: var(--red); }
    @keyframes ding {
      50% { transform: scale(1.04); filter: brightness(1.25); }
    }
  </style>
</head>
<body>
  <main>
    <p class="pair">BTC / USDT · OKX spot</p>
    <p class="price loading" id="last">Loading…</p>
    <div class="chart-wrap">
      <p class="chart-label" id="chartLabel">BTC price · 5m · last 4h</p>
      <canvas id="chart" aria-label="BTC price chart"></canvas>
    </div>
    <dl>
      <div>
        <dt>Bid</dt>
        <dd id="bid">—</dd>
      </div>
      <div>
        <dt>Ask</dt>
        <dd id="ask">—</dd>
      </div>
      <div class="range-bar">
        <dt>24h range</dt>
        <dd>
          <div class="range-track">
            <div class="range-fill" id="rangeFill"></div>
            <div class="range-marker" id="rangeMarker"></div>
          </div>
          <div class="range-labels">
            <span id="low24">—</span>
            <span id="high24">—</span>
          </div>
        </dd>
      </div>
    </dl>
    <p class="error" id="error" hidden></p>
    <div class="ding-toggles">
      <label class="toggle-row">
        <input type="checkbox" id="ding100" checked>
        <span class="toggle-switch" aria-hidden="true"></span>
        <span class="toggle-label">$100 boundary · 2 dings</span>
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="ding1000" checked>
        <span class="toggle-switch" aria-hidden="true"></span>
        <span class="toggle-label">$1000 boundary · 10 dings</span>
      </label>
    </div>
    <button type="button" class="test-ding" id="testDing">Test ding</button>
    <footer><span id="status">Loading…</span> · Bell v2 · $100/$1000 dings</footer>
  </main>
  <script>
    let lastHundred = null;
    let lastThousand = null;
    let audioCtx = null;
    let soundReady = false;

    const DING_GAP_MS = 220;
    const DINGS_PER_100 = 2;
    const DINGS_PER_THOUSAND = 10;

    const fmt = (n) =>
      n == null ? "—" : "$" + n.toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });

    function updateTitle(price) {
      document.title =
        Math.round(price).toLocaleString("en-US") + " USDT";
    }

    const hundredBucket = (price) => Math.floor(price / 100);
    const thousandBucket = (price) => Math.floor(price / 1000);

    function getAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      return audioCtx;
    }

    function enableSound() {
      const ctx = getAudio();
      const resume = ctx.state === "suspended" ? ctx.resume() : Promise.resolve();
      return resume.then(() => {
        soundReady = ctx.state === "running";
        return soundReady;
      });
    }

    function flashPrice(up) {
      const el = document.getElementById("last");
      el.classList.remove("ding-up", "ding-down");
      void el.offsetWidth;
      el.classList.add(up ? "ding-up" : "ding-down");
      setTimeout(() => el.classList.remove("ding-up", "ding-down"), 400);
    }

    function playDingAt(up, offsetMs = 0) {
      if (!soundReady) return;
      const ctx = getAudio();
      const t0 = ctx.currentTime + offsetMs / 1000;
      const base = up ? 2093 : 1318;

      const partials = [
        { ratio: 1, amp: 1, type: "triangle" },
        { ratio: 2.0, amp: 0.55, type: "sine" },
        { ratio: 2.71, amp: 0.4, type: "sine" },
        { ratio: 3.53, amp: 0.28, type: "sine" },
        { ratio: 4.68, amp: 0.18, type: "sine" },
        { ratio: 6.27, amp: 0.1, type: "sine" },
      ];

      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, t0);
      master.gain.exponentialRampToValueAtTime(0.85, t0 + 0.008);
      master.gain.exponentialRampToValueAtTime(0.001, t0 + 1.15);
      master.connect(ctx.destination);

      const stopAt = t0 + 1.2;
      for (const p of partials) {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = p.type;
        osc.frequency.setValueAtTime(base * p.ratio, t0);
        osc.frequency.exponentialRampToValueAtTime(base * p.ratio * 0.992, stopAt);
        g.gain.value = p.amp;
        osc.connect(g);
        g.connect(master);
        osc.start(t0);
        osc.stop(stopAt);
      }
    }

    function playDings(count, up) {
      if (!soundReady || count < 1) return;
      for (let i = 0; i < count; i++) {
        playDingAt(up, i * DING_GAP_MS);
      }
      flashPrice(up);
    }

    function isDing100On() {
      return document.getElementById("ding100").checked;
    }

    function isDing1000On() {
      return document.getElementById("ding1000").checked;
    }

    function saveDingToggles() {
      localStorage.setItem("ding100", isDing100On());
      localStorage.setItem("ding1000", isDing1000On());
    }

    function loadDingToggles() {
      const d100 = localStorage.getItem("ding100");
      const d1000 = localStorage.getItem("ding1000");
      if (d100 !== null) {
        document.getElementById("ding100").checked = d100 === "true";
      } else {
        const legacy = localStorage.getItem("ding200");
        if (legacy !== null) {
          document.getElementById("ding100").checked = legacy === "true";
        }
      }
      if (d1000 !== null) document.getElementById("ding1000").checked = d1000 === "true";
    }

    function checkBoundaryChange(price) {
      const hundred = hundredBucket(price);
      const thousand = thousandBucket(price);

      if (
        isDing1000On() &&
        lastThousand !== null &&
        thousand !== lastThousand
      ) {
        const steps = Math.abs(thousand - lastThousand);
        playDings(steps * DINGS_PER_THOUSAND, thousand > lastThousand);
      } else if (
        isDing100On() &&
        lastHundred !== null &&
        hundred !== lastHundred
      ) {
        const steps = Math.abs(hundred - lastHundred);
        playDings(steps * DINGS_PER_100, hundred > lastHundred);
      }

      lastHundred = hundred;
      lastThousand = thousand;
    }

    function drawChart(points) {
      const canvas = document.getElementById("chart");
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const w = rect.width;
      const h = rect.height;
      const pad = { t: 8, r: 8, b: 18, l: 52 };
      const closes = points.map((p) => p.close);
      let min = Math.min(...closes);
      let max = Math.max(...closes);
      const padY = (max - min) * 0.08 || max * 0.001;
      min -= padY;
      max += padY;
      const up = closes[closes.length - 1] >= closes[0];
      const lineColor = up ? "#3fb950" : "#f85149";

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = "#30363d";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 3; i++) {
        const y = pad.t + ((h - pad.t - pad.b) * i) / 3;
        ctx.beginPath();
        ctx.moveTo(pad.l, y);
        ctx.lineTo(w - pad.r, y);
        ctx.stroke();
        const val = max - ((max - min) * i) / 3;
        ctx.fillStyle = "#8b949e";
        ctx.font = "10px Menlo, monospace";
        ctx.textAlign = "right";
        ctx.fillText("$" + val.toFixed(0), pad.l - 6, y + 3);
      }

      const xAt = (i) =>
        pad.l + (i / (points.length - 1)) * (w - pad.l - pad.r);
      const yAt = (v) =>
        pad.t + (1 - (v - min) / (max - min)) * (h - pad.t - pad.b);

      const grad = ctx.createLinearGradient(0, pad.t, 0, h - pad.b);
      grad.addColorStop(0, up ? "rgba(63,185,80,0.25)" : "rgba(248,81,73,0.25)");
      grad.addColorStop(1, "rgba(0,0,0,0)");

      ctx.beginPath();
      points.forEach((p, i) => {
        const x = xAt(i);
        const y = yAt(p.close);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.lineTo(xAt(points.length - 1), h - pad.b);
      ctx.lineTo(xAt(0), h - pad.b);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      ctx.beginPath();
      points.forEach((p, i) => {
        const x = xAt(i);
        const y = yAt(p.close);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.stroke();

      const last = points[points.length - 1];
      ctx.fillStyle = "#f7931a";
      ctx.beginPath();
      ctx.arc(xAt(points.length - 1), yAt(last.close), 3.5, 0, Math.PI * 2);
      ctx.fill();
    }

    async function loadChart() {
      try {
        const res = await fetch("/api/candles");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        if (data.points?.length) drawChart(data.points);
      } catch (e) {
        document.getElementById("chartLabel").textContent =
          "Chart unavailable";
      }
    }

    function setRange(last, low, high) {
      const pct = high > low ? ((last - low) / (high - low)) * 100 : 50;
      document.getElementById("rangeMarker").style.left = pct + "%";
      document.getElementById("rangeFill").style.width = pct + "%";
    }

    async function refresh() {
      const errEl = document.getElementById("error");
      errEl.hidden = true;
      try {
        const res = await fetch("/api/ticker");
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);

        const lastEl = document.getElementById("last");
        lastEl.textContent = fmt(data.last);
        lastEl.classList.remove("loading");
        updateTitle(data.last);
        checkBoundaryChange(data.last);
        document.getElementById("bid").textContent = fmt(data.bid);
        document.getElementById("ask").textContent = fmt(data.ask);
        document.getElementById("low24").textContent = fmt(data.low24h);
        document.getElementById("high24").textContent = fmt(data.high24h);
        setRange(data.last, data.low24h, data.high24h);

        const ts = data.ts ? new Date(Number(data.ts)) : new Date();
        document.getElementById("status").textContent =
          "Updated " + ts.toLocaleTimeString();
      } catch (e) {
        errEl.textContent = e.message;
        errEl.hidden = false;
      }
    }

    document.getElementById("testDing").addEventListener("click", () => {
      enableSound().then((ok) => {
        if (ok) playDings(DINGS_PER_100, true);
      });
      fetch("/api/telegram/test-ding")
        .then((r) => r.json())
        .then((d) => {
          if (d.error) console.warn("Telegram:", d.error);
        })
        .catch((e) => console.warn("Telegram:", e));
    });

    loadDingToggles();
    document.getElementById("ding100").addEventListener("change", saveDingToggles);
    document.getElementById("ding1000").addEventListener("change", saveDingToggles);

    refresh();
    loadChart();
    setInterval(refresh, 2000);
    setInterval(loadChart, 60000);
    window.addEventListener("resize", () => {
      fetch("/api/candles")
        .then((r) => r.json())
        .then((d) => d.points?.length && drawChart(d.points))
        .catch(() => {});
    });
  </script>
</body>
</html>
