<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Design Patterns (You must know in 2026)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #1a1a1a;
      padding: 24px 32px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Header */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .page-header .year { font-size: 14px; color: #555; }
    .page-header .follow { font-size: 14px; color: #555; }
    .main-title {
      text-align: center;
      margin-bottom: 28px;
    }
    .main-title h1 {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .main-title p {
      font-size: clamp(16px, 2.5vw, 22px);
      color: #333;
      margin-top: 4px;
    }

    /* Grid */
    .patterns-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 1100px) {
      .patterns-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .patterns-grid { grid-template-columns: 1fr; }
    }

    /* Cards */
    .pattern-card {
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      overflow: hidden;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      min-height: 320px;
    }
    .pattern-card.wide {
      grid-column: 1 / -1;
      min-height: 280px;
    }
    .card-header {
      padding: 10px 14px;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      text-align: center;
    }
    .card-body {
      flex: 1;
      padding: 12px 10px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card-body svg.flow-svg {
      width: 100%;
      height: auto;
      max-height: 260px;
    }
    .pattern-card.wide .card-body svg.flow-svg {
      max-height: 220px;
    }

    /* Themes */
    .theme-gold .card-header { background: linear-gradient(135deg, #e8a317, #f5c842); color: #3d2e00; }
    .theme-blue .card-header { background: linear-gradient(135deg, #2563eb, #3b82f6); }
    .theme-purple .card-header { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
    .theme-green .card-header { background: linear-gradient(135deg, #059669, #34d399); }
    .theme-orange .card-header { background: linear-gradient(135deg, #ea580c, #fb923c); }
    .theme-navy .card-header { background: linear-gradient(135deg, #1e3a5f, #2563eb); }
    .theme-magenta .card-header { background: linear-gradient(135deg, #be185d, #ec4899); }

    /* Footer */
    .page-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 28px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #555;
    }
    .page-footer a { color: #0a66c2; text-decoration: none; }
    .page-footer .social { display: flex; align-items: center; gap: 6px; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <span class="year">@2025</span>
    <span class="follow">Follow</span>
  </div>

  <div class="main-title">
    <h1>RAG Design patterns</h1>
    <p>(You must know in 2026)</p>
  </div>

  <div class="patterns-grid">

            <text x="20" y="44" text-anchor="middle" font-size="8" fill="#333">Context</text>
            <line x1="40" y1="16" x2="55" y2="16" stroke="#e8a317" stroke-width="1.5" marker-end="url(#arr-g)"/>
          </g>
          <!-- Prompt -->

            <text x="22" y="22" text-anchor="middle" font-size="11" fill="#fbbf24" font-family="monospace">&gt;_</text>
            <text x="22" y="48" text-anchor="middle" font-size="7" fill="#333">Prompt template</text>
            <line x1="44" y1="17" x2="58" y2="17" stroke="#e8a317" stroke-width="1.5" marker-end="url(#arr-g)"/>
          </g>
