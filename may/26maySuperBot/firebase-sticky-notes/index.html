<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sticky Notes — Firestore</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    .sub { color: #94a3b8; font-size: 0.85rem; margin-bottom: 16px; }
    .bar { padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; font-size: 0.85rem; border: 1px solid #334155; }
    .bar.ok { background: #052e1a; border-color: #166534; color: #86efac; }
    .bar.warn { background: #422006; border-color: #a16207; color: #fde68a; }
    .bar.err { background: #450a0a; border-color: #b91c1c; color: #fecaca; }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; }
    input, textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #f1f5f9; font: inherit; margin-bottom: 10px; }
    textarea { min-height: 72px; }
    button { padding: 10px 18px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; background: #f59e0b; color: #0f172a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .notes { display: grid; gap: 10px; }
    .note { background: #fef3c7; color: #1c1917; border-radius: 10px; padding: 14px 40px 14px 14px; position: relative; }
    .note h3 { margin: 0 0 6px; font-size: 1rem; }
    .note p { margin: 0; white-space: pre-wrap; font-size: 0.9rem; }
    .note .meta { font-size: 0.7rem; color: #57534e; margin-top: 8px; }
    .note .del { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border: none; border-radius: 6px; background: rgba(0,0,0,0.12); cursor: pointer; }
    .empty { color: #64748b; text-align: center; padding: 24px; }
    #rulesHelp { display: none; }
    #rulesHelp pre { background: #0f172a; padding: 12px; border-radius: 8px; font-size: 0.7rem; border: 1px solid #475569; overflow-x: auto; }
    #rulesHelp a { color: #38bdf8; }
    code { background: #0f172a; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Sticky Notes (Firestore)</h1>
    <p class="sub">Config from <code>config.json</code> · save via <code>addDoc()</code></p>
    <div id="statusBar" class="bar warn">Loading config…</div>
    <div id="rulesHelp">
      <p><strong>Publish Firestore rules</strong> (see <code>firestore.rules</code>) and enable <strong>Anonymous</strong> auth.</p>
      <pre id="rulesText"></pre>
      <p><a id="rulesLink" href="#" target="_blank" rel="noopener">Open Rules in Console</a></p>
    </div>
    <div class="panel">
      <label>Title</label>
      <input id="title" placeholder="Note title" />
      <label>Content</label>
      <textarea id="content" placeholder="Note content"></textarea>
      <button id="addBtn" type="button" disabled>Add note</button>
    </div>
    <div class="panel">
      <p class="sub" style="margin:0 0 10px">Notes (<span id="count">0</span>)</p>
      <div id="notes" class="notes"></div>
      <p id="empty" class="empty">No notes yet.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, deleteDoc, doc,
      onSnapshot, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const FIRESTORE_RULES = `rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /artifacts/{appId}/public/data/notes/{noteId} {
      allow read, write: if request.auth != null;
    }
  }
}`;

    const $ = (id) => document.getElementById(id);
    let firebaseConfig, notesAppId, db, auth, user, unsub;
    const notes = new Map();

    $("rulesText").textContent = FIRESTORE_RULES;

    function setStatus(kind, msg) {
      $("statusBar").className = "bar " + kind;
      $("statusBar").textContent = msg;
    }

    async function loadConfig() {
      const res = await fetch("config.json", { cache: "no-store" });
      if (!res.ok) throw new Error("Missing config.json — copy from config.json.example");
      const cfg = await res.json();
      for (const k of ["apiKey", "authDomain", "projectId", "appId"]) {
        if (!cfg[k]) throw new Error("config.json missing: " + k);
      }
      return cfg;
    }

    function notesCollection() {
      return collection(db, "artifacts", notesAppId, "public", "data", "notes");
    }

    /** SAVE TO FIRESTORE — called when user clicks Add */
    async function saveNoteToFirestore(title, content) {
      await addDoc(notesCollection(), {
        title: title || "(no title)",
        content,
        authorId: user.uid,
        createdAt: serverTimestamp()
      });
    }

    function renderNote(id, data) {
      let el = document.querySelector(`[data-id="${id}"]`);
      if (!el) {
        el = document.createElement("div");
        el.className = "note";
        el.dataset.id = id;
        el.innerHTML = `<button class="del" type="button">×</button><h3></h3><p></p><div class="meta"></div>`;
        el.querySelector(".del").onclick = () =>
          deleteDoc(doc(db, "artifacts", notesAppId, "public", "data", "notes", id));
        $("notes").appendChild(el);
      }
      el.querySelector("h3").textContent = data.title || "(no title)";
      el.querySelector("p").textContent = data.content || "";
      const t = data.createdAt?.toDate?.();
      el.querySelector(".meta").textContent = t ? t.toLocaleString() : "syncing…";
    }

    function syncUI() {
      $("count").textContent = notes.size;
      $("empty").style.display = notes.size ? "none" : "block";
    }

    function listenNotes() {
      unsub = onSnapshot(notesCollection(), (snap) => {
        for (const ch of snap.docChanges()) {
          const id = ch.doc.id;
          if (ch.type === "removed") {
            notes.delete(id);
            document.querySelector(`[data-id="${id}"]`)?.remove();
          } else {
            notes.set(id, ch.doc.data());
            renderNote(id, ch.doc.data());
          }
        }
        syncUI();
        $("rulesHelp").style.display = "none";
        setStatus("ok", "Cloud ready · uid " + user.uid.slice(0, 12) + "…");
      }, (err) => {
        console.error(err);
        $("rulesHelp").style.display = "block";
        setStatus("err", err.code === "permission-denied" ? "Permission denied — publish firestore.rules" : err.message);
        $("addBtn").disabled = true;
      });
    }

    async function boot() {
      try {
        firebaseConfig = await loadConfig();
        notesAppId = firebaseConfig.projectId;
        $("rulesLink").href = `https://console.firebase.google.com/project/${firebaseConfig.projectId}/firestore/rules`;

        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        user = await new Promise((resolve, reject) => {
          const off = onAuthStateChanged(auth, (u) => { if (u) { off(); resolve(u); } });
          signInAnonymously(auth).catch(reject);
        });

        $("addBtn").disabled = false;
        setStatus("ok", "Signed in");
        listenNotes();
      } catch (e) {
        console.error(e);
        $("rulesHelp").style.display = "block";
        setStatus("err", e.message || "Boot failed");
      }
    }

    $("addBtn").onclick = async () => {
      const title = $("title").value.trim();
      const content = $("content").value.trim();
      if (!title && !content) return;
      await saveNoteToFirestore(title, content);
      $("title").value = "";
      $("content").value = "";
    };

    boot();
  </script>
</body>
</html>
