{{define "index"}}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKX Web V5 API Monitor (SSR)</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #121212;
            --border-color: #1f1f1f;
            --text-main: #ffffff;
            --text-muted: #848e9c;
            --green: #2ebd85;
            --red: #f6465d;
            --btn-bg: #2b3139;
            --btn-hover: #353c46;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        .badge-ssr {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: normal;
        }
        .status-bar {
            display: flex;
            gap: 15px;
            font-size: 13px;
            margin-bottom: 15px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--red);
            margin-right: 5px;
        }
        .status-dot.connected { background-color: var(--green); }
        .alert {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .alert.err { background: #2a1518; color: var(--red); border: 1px solid #4a2028; }
        .table-container {
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }
        th {
            color: var(--text-muted);
            font-weight: normal;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            vertical-align: middle;
        }
        tr:hover td { background-color: #181a20; }
        .symbol-name { font-weight: 600; }
        .lever-badge {
            background-color: #2b3139;
            color: #f3ba2f;
            font-size: 11px;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 5px;
        }
        .pos-positive { color: var(--green); }
        .pos-negative { color: var(--red); }
        .muted { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
        .logs-section {
            margin-top: 25px;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }
        .logs-section h3 { font-size: 14px; margin-bottom: 10px; color: var(--text-muted); }
        .log-console {
            background-color: #050505;
            padding: 10px;
            border-radius: 4px;
            max-height: 160px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
            color: #aaa;
            line-height: 1.5;
        }
        .log-line { margin-bottom: 2px; }
        form.inline { display: inline; }
        button.btn-close, .btn-close {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        button.btn-close:hover { background-color: var(--btn-hover); }
        .btn-secondary {
            background-color: var(--btn-bg);
            color: var(--text-main);
            display: inline-block;
            padding: 4px 8px;
            font-size: 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>OKX V5 API - Quản lý Vị thế Mở <span class="badge-ssr">(env · HTMX)</span></h1>
    </header>

    {{if .Message}}
    <div class="alert err">{{.Message}}</div>
    {{end}}

    <div id="live-panel">
        {{if .Connected}}
        <div hx-get="/fragment/live"
             hx-trigger="every 1s"
             hx-target="#live-panel-body"
             hx-swap="innerHTML"
             style="display:none"></div>
        {{end}}
        <div id="live-panel-body">
            {{template "live_panel" .}}
        </div>
    </div>
</div>
</body>
</html>
{{end}}
