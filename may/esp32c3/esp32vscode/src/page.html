<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <style>
      :root {
        --bg: #0b1220;
        --surface: rgba(255, 255, 255, 0.06);
        --surface2: rgba(255, 255, 255, 0.08);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --border: rgba(255, 255, 255, 0.12);
        --primary: #7c4dff;
        --primary2: #00d5ff;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(
            1000px 600px at 20% 0%,
            rgba(124, 77, 255, 0.35),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 100% 10%,
            rgba(0, 213, 255, 0.25),
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
        padding: 24px 14px 40px;
      }

      .app {
        max-width: 520px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 2px 14px;
      }

      .title {
        text-align: left;
        line-height: 1.1;
      }

      .title h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .title p {
        margin: 6px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .chip {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.08),
          rgba(255, 255, 255, 0.05)
        );
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card + .card {
        margin-top: 14px;
      }

      .cardHeader {
        padding: 14px 16px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .cardHeader h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }

      .value {
        font-variant-numeric: tabular-nums;
        color: var(--muted);
        font-size: 12px;
      }

      .cardBody {
        padding: 14px 16px 16px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 10px;
      }

      .msInput {
        width: 110px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        outline: none;
        font-size: 13px;
        font-variant-numeric: tabular-nums;
      }

      .msInput:focus {
        border-color: rgba(124, 77, 255, 0.65);
        box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.18);
      }

      .msSuffix {
        margin-left: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .range {
        width: 100%;
        margin: 4px 0 0;
        -webkit-appearance: none;
        appearance: none;
        height: 34px;
        background: transparent;
        outline: none;
      }

      .range::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--primary), var(--primary2));
        opacity: 0.9;
      }
      .range::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        margin-top: -6px;
        border-radius: 50%;
        background: #fff;
        border: 3px solid rgba(11, 18, 32, 0.85);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      }

      .range::-moz-range-track {
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--primary), var(--primary2));
        opacity: 0.9;
      }
      .range::-moz-range-thumb {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        border: 3px solid rgba(11, 18, 32, 0.85);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
      }

      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.4;
      }

      .footer {
        margin-top: 14px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="title">
          <h1>ESP32-C3 Controller</h1>
          <p>Adjust timings in real-time over Wi-Fi</p>
        </div>
        <div class="chip">HTTP /</div>
      </div>

      <div class="card">
        <div class="cardHeader">
          <h2>LED Blink Speed</h2>
          <div class="value"><span id="ledv">%LED_DELAY%</span> ms</div>
        </div>
        <div class="cardBody">
          <input
            id="led"
            class="range"
            type="range"
            min="50"
            max="2000"
            value="%LED_DELAY%"
          />
          <div class="row">
            <p class="hint">Lower = faster blinking</p>
            <div>
              <input
                id="ledMs"
                class="msInput"
                type="number"
                min="50"
                max="2000"
                step="10"
                value="%LED_DELAY%"
              /><span class="msSuffix">ms</span>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="cardHeader">
          <h2>OLED Symbol Speed</h2>
          <div class="value"><span id="oledv">%OLED_DELAY%</span> ms</div>
        </div>
        <div class="cardBody">
          <input
            id="oled"
            class="range"
            type="range"
            min="50"
            max="2000"
            value="%OLED_DELAY%"
          />
          <div class="row">
            <p class="hint">Lower = faster cycling</p>
            <div>
              <input
                id="oledMs"
                class="msInput"
                type="number"
                min="50"
                max="2000"
                step="10"
                value="%OLED_DELAY%"
              /><span class="msSuffix">ms</span>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">
        Tip: drag the slider to preview the value, then release to apply.
      </div>
    </div>

    <script>
      const led = document.getElementById("led");
      const oled = document.getElementById("oled");
      const ledv = document.getElementById("ledv");
      const oledv = document.getElementById("oledv");
      const ledMs = document.getElementById("ledMs");
      const oledMs = document.getElementById("oledMs");

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

      function go() {
        const params = new URLSearchParams({
          led: led.value,
          oled: oled.value,
        });
        window.location.href = "/?" + params.toString();
      }

      function syncFromSlider() {
        ledv.textContent = led.value;
        oledv.textContent = oled.value;
        ledMs.value = led.value;
        oledMs.value = oled.value;
      }

      function applyMsInputs() {
        const ledMin = Number(led.min);
        const ledMax = Number(led.max);
        const oledMin = Number(oled.min);
        const oledMax = Number(oled.max);

        const ledVal = clamp(Number(ledMs.value || led.value), ledMin, ledMax);
        const oledVal = clamp(Number(oledMs.value || oled.value), oledMin, oledMax);

        led.value = String(ledVal);
        oled.value = String(oledVal);
        syncFromSlider();
        go();
      }

      led.addEventListener("input", syncFromSlider);
      oled.addEventListener("input", syncFromSlider);
      led.addEventListener("change", go);
      oled.addEventListener("change", go);

      ledMs.addEventListener("change", applyMsInputs);
      oledMs.addEventListener("change", applyMsInputs);
      ledMs.addEventListener("keydown", (e) => e.key === "Enter" && applyMsInputs());
      oledMs.addEventListener("keydown", (e) => e.key === "Enter" && applyMsInputs());

      // Initial sync in case placeholders differ
      syncFromSlider();
    </script>
  </body>
</html>
