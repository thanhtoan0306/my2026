<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <p class="badge">Server-side rendered</p>
    <h1>{{.Message}}</h1>
    <p class="lead">This HTML was generated by Go <code>html/template</code> on the backend, then shown inside a native macOS desktop window.</p>
    <dl class="meta">
      <div><dt>Rendered at</dt><dd>{{.RenderedAt}}</dd></div>
      <div><dt>Go version</dt><dd>{{.GoVersion}}</dd></div>
      <div><dt>Platform</dt><dd>{{.Platform}}</dd></div>
    </dl>
    <form method="get" action="/" class="greet">
      <label for="name">Your name</label>
      <input id="name" name="name" type="text" value="{{.Name}}" placeholder="World">
      <button type="submit">Greet</button>
    </form>
  </main>
</body>
</html>
